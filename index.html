<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>目線｜日文假名學習</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main class="kana-app">
        <header class="page-header">
            <p class="eyebrow">MOKUSEN · Kana Practice</p>
            <h1>目線｜假名學習</h1>
            <p class="description">
                切換清音、濁音、半濁音與拗音，並搭配平假名、片假名或對照模式練習。
            </p>
        </header>

        <section class="control-section" aria-labelledby="modeTitle">
            <h2 id="modeTitle">練習模式</h2>

            <div class="button-group" role="group" aria-label="選擇練習模式">
                <button class="mode-button active" type="button" data-mode="hiragana" aria-pressed="true">
                    平假名
                </button>

                <button class="mode-button" type="button" data-mode="katakana" aria-pressed="false">
                    片假名
                </button>

                <button class="mode-button" type="button" data-mode="both" aria-pressed="false">
                    平假名＆片假名
                </button>
            </div>
        </section>

        <section class="control-section" aria-labelledby="categoryTitle">
            <h2 id="categoryTitle">假名分類</h2>

            <div class="button-group category-group" role="group" aria-label="選擇假名分類">
                <button class="category-button active" type="button" data-category="seion" aria-pressed="true">
                    清音
                </button>

                <button class="category-button" type="button" data-category="dakuon" aria-pressed="false">
                    濁音
                </button>

                <button class="category-button" type="button" data-category="handakuon" aria-pressed="false">
                    半濁音
                </button>

                <button class="category-button" type="button" data-category="youon" aria-pressed="false">
                    拗音
                </button>

                <button class="category-button" type="button" data-category="all" aria-pressed="false">
                    全部
                </button>
            </div>
        </section>

        <section class="control-section" aria-labelledby="displayTitle">
            <h2 id="displayTitle">遮擋設定</h2>

            <div class="toggle-group">
                <label class="toggle-option">
                    <input id="hiraganaToggle" type="checkbox" checked>
                    <span>顯示平假名</span>
                </label>

                <label class="toggle-option">
                    <input id="katakanaToggle" type="checkbox" checked>
                    <span>顯示片假名</span>
                </label>

                <label class="toggle-option">
                    <input id="romajiToggle" type="checkbox" checked>
                    <span>顯示羅馬拼音</span>
                </label>
            </div>
        </section>

        <section class="practice-status" aria-live="polite">
            <span id="modeLabel">平假名模式 · 清音</span>
            <span id="progressText">1 / 46</span>
        </section>

        <section class="card-area">
            <article id="kanaCard" class="kana-card" tabindex="0" aria-label="假名練習卡片">
                <div id="hiraganaPanel" class="kana-panel" data-field="hiragana" lang="ja">
                    <span class="kana-label">平假名</span>
                    <span id="hiraganaText" class="kana-character">あ</span>
                    <span class="hidden-message">點擊顯示</span>
                </div>

                <div id="katakanaPanel" class="kana-panel" data-field="katakana" lang="ja">
                    <span class="kana-label">片假名</span>
                    <span id="katakanaText" class="kana-character">ア</span>
                    <span class="hidden-message">點擊顯示</span>
                </div>

                <div id="romajiPanel" class="romaji-panel" data-field="romaji">
                    <span class="kana-label">羅馬拼音</span>
                    <span id="romajiText" class="romaji-text">a</span>
                    <span class="hidden-message">點擊顯示</span>
                </div>
            </article>

            <p class="card-hint">
                點擊被遮住的區塊，可以暫時翻開答案。
            </p>
        </section>

        <section class="navigation">
            <button id="previousButton" class="secondary-button" type="button">
                ← 上一張
            </button>

            <button id="revealButton" class="primary-button" type="button">
                顯示全部答案
            </button>

            <button id="nextButton" class="secondary-button" type="button">
                下一張 →
            </button>
        </section>

        <section class="extra-actions">
            <button id="shuffleButton" class="text-button" type="button">
                ⇄ 隨機排列
            </button>

            <button id="resetButton" class="text-button" type="button">
                ↺ 恢復順序
            </button>
        </section>
    </main>

    <script src="./script.js"></script>
</body>
</html>
